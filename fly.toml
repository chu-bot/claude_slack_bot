# fly.toml app configuration file generated for claude-slack-bot-mokadoe on 2026-04-24T21:41:40-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'claude-slack-bot-mokadoe'
primary_region = 'ewr'

[build]

[env]
  DEFAULT_REPO_PATH = '/app/projects'

[[mounts]]
  source = 'bot_data'
  destination = '/app/data'

[[mounts]]
  source = 'bot_projects'
  destination = '/app/projects'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
